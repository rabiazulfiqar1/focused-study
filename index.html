<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <img src="./wallpaper.png" alt="Wallpaper" class="fixed inset-0 -z-10 w-full h-full object-cover">
    <div id="time-container" class = "bg-white/20 top-1/4 left-1/2 transform -translate-x-1/2 -translate-y-1/2 absolute rounded-2xl p-5 shadow-lg backdrop-blur-md">
        <p id = "time" class="text-8xl font-bold text-white"></p>
    </div>

    <script>
        function updateTime() {
            let now = new Date();
            const time12hr = now.toLocaleTimeString(
                'en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true
                }
            );
            console.log(time12hr);
            document.getElementById('time').textContent = time12hr;
            console.log(time12hr);
        };

        setInterval(updateTime, 1000);
    </script>
</body>
</html>
